<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu Ứng Và Hoạt Ảnh CSS</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="loading-container">
        <div class="spinner"></div>
        <p>Đang tải sản phẩm...</p>
    </div>

    <h1 class="page-title">Danh Sách Sản Phẩm Nổi Bật</h1>

    <main class="product-grid">
        
        <article class="product-card">
            <div class="img-container">
                <img src="https://picsum.photos/400/400?random=1" alt="Sản phẩm" class="product-img">
            </div>
            <div class="product-info">
                <h2 class="product-title">Giày Thể Thao Sneaker X</h2>
                <p class="product-price">1.250.000 đ</p>
                <button class="btn-buy">Mua ngay</button>
            </div>
        </article>

        <article class="product-card">
            <div class="img-container">
                <img src="https://picsum.photos/400/400?random=2" alt="Sản phẩm" class="product-img">
            </div>
            <div class="product-info">
                <h2 class="product-title">Áo Khoác Bomber Classic</h2>
                <p class="product-price">650.000 đ</p>
                <button class="btn-buy">Mua ngay</button>
            </div>
        </article>

        <article class="product-card">
            <div class="img-container">
                <img src="https://picsum.photos/400/400?random=3" alt="Sản phẩm" class="product-img">
            </div>
            <div class="product-info">
                <h2 class="product-title">Balo Đi Học Thời Trang</h2>
                <p class="product-price">450.000 đ</p>
                <button class="btn-buy">Mua ngay</button>
            </div>
        </article>

        <article class="product-card">
            <div class="img-container">
                <img src="https://picsum.photos/400/400?random=4" alt="Sản phẩm" class="product-img">
            </div>
            <div class="product-info">
                <h2 class="product-title">Đồng Hồ Thông Minh Gen 5</h2>
                <p class="product-price">2.990.000 đ</p>
                <button class="btn-buy">Mua ngay</button>
            </div>
        </article>

    </main>

</body>
</html>
